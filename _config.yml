# =========================================================================
# Site identity
# =========================================================================
title: Sophie Strassmann-Peña
subtitle: Mindful Human Capital
description: >-
  Personal site of Sophie Strassmann-Peña — interdisciplinary researcher
  in human capital economics, computational social science, and the
  political economy of methodological change. PhD-bound, Université de
  Montréal.
author:
  name: Sophie Strassmann-Peña
  email: sophie.strassmann@mail.mcgill.ca
  linkedin: sophiestrassmann
  orcid: # add when available
  github: # add when available

# Replace with your real GitHub Pages URL after deploying.
url: "https://YOUR-USERNAME.github.io"
baseurl: "" # leave empty if deploying to <username>.github.io; set to "/repo-name" otherwise

# =========================================================================
# Build / GitHub Pages compatibility
# =========================================================================
# GitHub Pages runs a fixed set of plugins. Everything below is on the
# allowlist; do NOT add plugins outside this list or the site will fail to
# build on GH Pages.
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-redirect-from

# Use the github-pages gem (pinned versions match what GH Pages serves).
# This is set in Gemfile, not here.

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:title/

# =========================================================================
# Collections
# =========================================================================
collections:
  pages:
    output: true
    permalink: /:path/
  publications:
    output: false # rendered as a list on /research/, not individual pages

# Default front-matter
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# =========================================================================
# Navigation (top bar)
# =========================================================================
nav:
  - title: Home
    url: /
  - title: Research
    url: /research/
  - title: CV
    url: /cv/
  - title: Teaching
    url: /teaching/
  - title: About
    url: /about/

# =========================================================================
# Exclude from build
# =========================================================================
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules
  - .sass-cache
  - .jekyll-cache
  - .github

# =========================================================================
# Sass
# =========================================================================
sass:
  style: compressed
  sass_dir: _sass

# Pagination (used if a blog/news section is added later)
paginate: 6
paginate_path: "/news/page:num/"

# =========================================================================
# Analytics — loaded only after explicit visitor consent
# =========================================================================
# Both providers stay dormant until the visitor clicks "Accept" on the
# consent banner. See _includes/consent.html and assets/js/consent.js.
#
# To disable a provider entirely, set its `id` to empty string (""). The
# template will skip injecting its script tag.

analytics:
  # Google Analytics 4 measurement ID. From your gtag snippet.
  ga_id: "G-YD2X7B39XH"

  # PostHog project API key. Get one at https://eu.posthog.com after sign-up
  # (free tier: 1M events/month). Replace the placeholder before deploy.
  posthog_key: "phc_REPLACE_WITH_YOUR_KEY"

  # EU instance per Law 25 / GDPR data-residency preference.
  # Change to "https://us.i.posthog.com" if you ever move to US instance.
  posthog_host: "https://eu.i.posthog.com"
